&lt;script&gt;
  (() =&gt; {
    const root = document.getElementById(&quot;order-api-theater&quot;);
    if (!root || root.dataset.ready === &quot;true&quot;) return;
    root.dataset.ready = &quot;true&quot;;

    const laneLabels = [
      [&quot;user&quot;, &quot;Caller&quot;],
      [&quot;panel-top&quot;, &quot;HTTP / API&quot;],
      [&quot;boxes&quot;, &quot;Application&quot;],
      [&quot;archive&quot;, &quot;Persistence&quot;],
      [&quot;database&quot;, &quot;PostgreSQL&quot;],
      [&quot;reply&quot;, &quot;Response&quot;]
    ];

    const commonProblem = [
      &quot;Errors use &lt;code&gt;application/problem+json&lt;/code&gt; with exactly eight members: type, title, status, detail, instance, code, traceId, and violations.&quot;,
      &quot;Known-route wrong method is &lt;code&gt;405&lt;/code&gt;; unacceptable &lt;code&gt;Accept&lt;/code&gt; is &lt;code&gt;406&lt;/code&gt;; unsupported create/PATCH media type is &lt;code&gt;415&lt;/code&gt;.&quot;,
      &quot;Unexpected order-endpoint failures become a sanitized &lt;code&gt;500&lt;/code&gt;; database details and stack traces never leave the server.&quot;
    ];

    const apis = {
      create: {
        method: &quot;POST&quot;,
        path: &quot;/api/v1/orders&quot;,
        token: &quot;Create request&quot;,
        steps: [
          {
            phase: &quot;The request&quot;,
            title: &quot;The caller sends an order&quot;,
            caption: &quot;The request contains only immutable product IDs and quantities.&quot;,
            icon: &quot;send&quot;,
            lane: 0,
            state: &quot;SENT&quot;,
            wire: &#x27;{&quot;items&quot;:[{&quot;productId&quot;:&quot;coffee-mug&quot;,&quot;quantity&quot;:2},{&quot;productId&quot;:&quot;notebook&quot;,&quot;quantity&quot;:1}]}&#x27;,
            code: [
              &quot;&lt;code&gt;POST /api/v1/orders&lt;/code&gt; accepts JSON only.&quot;,
              &quot;The body contains one &lt;code&gt;items&lt;/code&gt; array with 1–100 entries.&quot;,
              &quot;There is no customer, price, inventory, payment, or idempotency key in V1.&quot;
            ]
          },
          {
            phase: &quot;The HTTP gate&quot;,
            title: &quot;Trace and validate first&quot;,
            caption: &quot;The server creates its own trace ID and rejects malformed or undocumented JSON before saving.&quot;,
            icon: &quot;shield-check&quot;,
            lane: 1,
            state: &quot;CHECKING&quot;,
            wire: &quot;X-Trace-Id: opaque server value&quot;,
            code: [
              &quot;&lt;code&gt;RequestTraceFilter&lt;/code&gt; creates the server-owned &lt;code&gt;X-Trace-Id&lt;/code&gt;; caller values are not trusted.&quot;,
              &quot;Jackson and Bean Validation reject unknown or duplicate members, numeric strings, floats, exponent quantities, missing items, and invalid bounds.&quot;,
              &quot;&lt;code&gt;productId&lt;/code&gt; is preserved exactly and compared case-sensitively; it is never normalized or case-folded.&quot;
            ]
          },
          {
            phase: &quot;Translation&quot;,
            title: &quot;HTTP becomes application input&quot;,
            caption: &quot;The controller chooses the create use case; the mapper removes HTTP-specific shape.&quot;,
            icon: &quot;arrow-left-right&quot;,
            lane: 1,
            state: &quot;MAPPED&quot;,
            wire: &quot;CreateOrderRequest → CreateOrderCommand&quot;,
            code: [
              &quot;&lt;code&gt;OrderController.create()&lt;/code&gt; receives the validated request.&quot;,
              &quot;&lt;code&gt;OrderApiMapper.toCommand()&lt;/code&gt; creates an immutable &lt;code&gt;CreateOrderCommand&lt;/code&gt;.&quot;,
              &quot;The API package never passes a JPA entity into or out of the controller.&quot;
            ]
          },
          {
            phase: &quot;Business decision&quot;,
            title: &quot;Build one valid pending order&quot;,
            caption: &quot;The service rejects exact duplicate products, then assigns the UUID, PENDING status, and one UTC timestamp.&quot;,
            icon: &quot;package-plus&quot;,
            lane: 2,
            state: &quot;READY&quot;,
            wire: &quot;OrderService.create() → OrderEntity.createPending()&quot;,
            code: [
              &quot;&lt;code&gt;OrderService.validateCreate()&lt;/code&gt; repeats critical item rules and rejects exact duplicate product IDs.&quot;,
              &quot;&lt;code&gt;OrderItemEntity.create()&lt;/code&gt; preserves submitted positions; &lt;code&gt;OrderEntity.createPending()&lt;/code&gt; attaches the children.&quot;,
              &quot;One &lt;code&gt;Clock.instant()&lt;/code&gt; value becomes both &lt;code&gt;createdAt&lt;/code&gt; and &lt;code&gt;updatedAt&lt;/code&gt;.&quot;
            ]
          },
          {
            phase: &quot;Persistence&quot;,
            title: &quot;Save the whole aggregate&quot;,
            caption: &quot;PostgreSQL receives the order and every item in one transaction: all rows commit, or none do.&quot;,
            icon: &quot;database&quot;,
            lane: [3, 4],
            state: &quot;SAVING&quot;,
            wire: &quot;orders × 1  +  order_items × 2&quot;,
            code: [
              &quot;&lt;code&gt;OrderRepository.save()&lt;/code&gt; persists the parent and cascades persist to its items.&quot;,
              &quot;Flyway-created constraints defend status, timestamps, product length/basic blankness, quantity, position, and per-order uniqueness.&quot;,
              &quot;The application alone guarantees at least one item and Java&#x27;s broader Unicode-blank rule.&quot;,
              &quot;&lt;code&gt;OrderResultMapper.toDetails()&lt;/code&gt; detaches the result while the transaction is still open.&quot;
            ]
          },
          {
            phase: &quot;The response&quot;,
            title: &quot;Commit, then return 201&quot;,
            caption: &quot;After the transaction commits, the API mapper builds the public order and the controller adds its Location.&quot;,
            icon: &quot;circle-check-big&quot;,
            lane: 5,
            state: &quot;201 CREATED&quot;,
            wire: &quot;Location: /api/v1/orders/7b3…e21&quot;,
            outcomes: [[&quot;201&quot;, &quot;Full order · PENDING&quot;]],
            code: [
              &quot;The service transaction commits before &lt;code&gt;OrderController.create()&lt;/code&gt; resumes.&quot;,
              &quot;&lt;code&gt;OrderApiMapper.toResponse()&lt;/code&gt; builds the full detail response; success bodies do not contain &lt;code&gt;traceId&lt;/code&gt;.&quot;,
              &quot;Repeating the same create request creates a different order because create idempotency is outside V1.&quot;
            ]
          },
          {
            phase: &quot;Refusal paths&quot;,
            title: &quot;Invalid orders stop at the boundary&quot;,
            caption: &quot;Create-specific invalid input is 400. Nothing is partially persisted.&quot;,
            icon: &quot;octagon-x&quot;,
            lane: 5,
            state: &quot;REFUSED&quot;,
            outcomes: [[&quot;400&quot;, &quot;Malformed or invalid request&quot;]],
            code: [
              &quot;&lt;code&gt;400 INVALID_REQUEST&lt;/code&gt; covers malformed/unknown fields, empty items, invalid product IDs, duplicates, and quantity bounds.&quot;,
              &quot;Validation failure happens before persistence, and any later failure rolls back the aggregate transaction.&quot;
            ].concat(commonProblem)
          }
        ]
      },
      get: {
        method: &quot;GET&quot;,
        path: &quot;/api/v1/orders/{orderId}&quot;,
        token: &quot;Detail request&quot;,
        steps: [
          {
            phase: &quot;The request&quot;,
            title: &quot;The caller asks for one order&quot;,
            caption: &quot;The path carries a UUID; there is no request body.&quot;,
            icon: &quot;search&quot;,
            lane: 0,
            state: &quot;SENT&quot;,
            wire: &quot;GET /api/v1/orders/7b3…e21&quot;,
            code: [
              &quot;&lt;code&gt;GET /api/v1/orders/{orderId}&lt;/code&gt; is safe and read-only.&quot;,
              &quot;The response, when found, contains the order and all submitted items.&quot;
            ]
          },
          {
            phase: &quot;The HTTP gate&quot;,
            title: &quot;Trace the request and parse the UUID&quot;,
            caption: &quot;A malformed UUID is rejected before the controller can ask the service.&quot;,
            icon: &quot;fingerprint&quot;,
            lane: 1,
            state: &quot;CHECKING&quot;,
            wire: &quot;X-Trace-Id + UUID conversion&quot;,
            code: [
              &quot;&lt;code&gt;RequestTraceFilter&lt;/code&gt; sets &lt;code&gt;X-Trace-Id&lt;/code&gt; on successes and errors.&quot;,
              &quot;Spring converts &lt;code&gt;orderId&lt;/code&gt; to &lt;code&gt;UUID&lt;/code&gt;; conversion failure maps to &lt;code&gt;400 INVALID_REQUEST&lt;/code&gt;.&quot;
            ]
          },
          {
            phase: &quot;Translation&quot;,
            title: &quot;The controller selects detail retrieval&quot;,
            caption: &quot;The thin controller forwards the UUID and never opens a transaction itself.&quot;,
            icon: &quot;route&quot;,
            lane: 1,
            state: &quot;ROUTED&quot;,
            wire: &quot;OrderController.get() → OrderService.get()&quot;,
            code: [
              &quot;&lt;code&gt;OrderController.get(UUID)&lt;/code&gt; calls the concrete application facade.&quot;,
              &quot;No request mapper is needed because the only input is already a UUID.&quot;
            ]
          },
          {
            phase: &quot;Application&quot;,
            title: &quot;Open a read-only use case&quot;,
            caption: &quot;The service asks for a complete aggregate and classifies a missing valid ID.&quot;,
            icon: &quot;book-open-check&quot;,
            lane: 2,
            state: &quot;READING&quot;,
            wire: &quot;@Transactional(readOnly = true)&quot;,
            code: [
              &quot;&lt;code&gt;OrderService.get()&lt;/code&gt; runs in a read-only transaction.&quot;,
              &quot;An empty repository result becomes &lt;code&gt;OrderNotFoundException&lt;/code&gt;.&quot;
            ]
          },
          {
            phase: &quot;Persistence&quot;,
            title: &quot;Load the order and its items together&quot;,
            caption: &quot;One aggregate query fetches the order and children; submitted item order is restored before detaching.&quot;,
            icon: &quot;database&quot;,
            lane: [3, 4],
            state: &quot;FOUND&quot;,
            wire: &quot;SELECT DISTINCT + LEFT JOIN FETCH items&quot;,
            code: [
              &quot;&lt;code&gt;OrderRepository.findDetailById()&lt;/code&gt; fetches the complete aggregate.&quot;,
              &quot;&lt;code&gt;OrderResultMapper.toDetails()&lt;/code&gt; sorts items by position and creates an immutable application result.&quot;,
              &quot;The API response never depends on an open persistence session.&quot;
            ]
          },
          {

      if (showingCode) {
        stage.hidden = true;
        codePanel.hidden = false;
      } else {
        stage.hidden = false;
        codePanel.hidden = true;
      }

      refreshIcons();
    };

    picker.addEventListener(&quot;change&quot;, () =&gt; {
      stop();
      apiKey = picker.value;
      stepIndex = 0;
      direction = &quot;forward&quot;;
      showingCode = false;
      codeToggle.textContent = &quot;Show code&quot;;
      codeToggle.setAttribute(&quot;aria-pressed&quot;, &quot;false&quot;);

      stop();

        direction = &quot;backward&quot;;
        stepIndex -= 1;

    next.addEventListener(&quot;click&quot;, () =&gt; {
      stop();
      if (stepIndex &lt; apis[apiKey].steps.length - 1) {
        direction = &quot;forward&quot;;
        stepIndex += 1;
        render();
      }
    });

    play.addEventListener(&quot;click&quot;, () =&gt; {
      if (showingCode) return;
      if (timer !== null) {
        stop();
        return;
      }
      if (stepIndex &gt;= apis[apiKey].steps.length - 1) {

        direction = &quot;forward&quot;;
        render();

      showingCode = !showingCode;

      codeToggle.setAttribute(&quot;aria-pressed&quot;, String(showingCode));

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;

  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }

    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {

    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);

      closeTooltip();
    }

    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
