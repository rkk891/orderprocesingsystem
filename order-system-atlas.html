              &lt;div class=&quot;story-proof-list&quot;&gt;&lt;span class=&quot;viz-badge&quot;&gt;Authentication&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;Role separation&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;TLS verification&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;Operating limits&lt;/span&gt;&lt;/div&gt;
              &lt;span&gt;Deliberately outside this assessment&lt;/span&gt;
            &lt;/div&gt;
          &lt;/div&gt;`,
        code: [
          &quot;&lt;code&gt;./mvnw clean verify&lt;/code&gt; passed 77 fast/MockMvc tests plus 26 Testcontainers PostgreSQL tests.&quot;,
          &quot;Newman exercises the running API; an opt-in scheduler smoke verified one pending-row processing run.&quot;,
          &quot;Scheduler metrics record duration, affected count, and failures; Actuator web exposure includes only the health endpoint.&quot;,
          &quot;The assessment uses one datasource identity; auth, separate migration/runtime roles, TLS verification, and limits remain hardening work.&quot;
        ]
      }
    ].sort((left, right) =&gt; left.order - right.order);

    const count = root.querySelector(&quot;#story-scene-count&quot;);
    const progress = root.querySelector(&quot;#story-progress&quot;);
    const progressFill = root.querySelector(&quot;#story-progress-fill&quot;);
    const chapter = root.querySelector(&quot;#story-chapter&quot;);
    const title = root.querySelector(&quot;#story-scene-title&quot;);
    const caption = root.querySelector(&quot;#story-caption&quot;);
    const orderAnchorNode = root.querySelector(&quot;#story-order-anchor&quot;);
    const orderAnchorLabel = root.querySelector(&quot;#story-order-anchor-label&quot;);
    const orderAnchorStatus = root.querySelector(&quot;#story-order-anchor-status&quot;);
    const stage = root.querySelector(&quot;#story-stage&quot;);
    const codePanel = root.querySelector(&quot;#story-code&quot;);
    const codeList = root.querySelector(&quot;#story-code-list&quot;);
    const back = root.querySelector(&quot;#story-back&quot;);
    const play = root.querySelector(&quot;#story-play&quot;);
    const next = root.querySelector(&quot;#story-next&quot;);
    const codeToggle = root.querySelector(&quot;#story-code-toggle&quot;);

    let sceneIndex = 0;
    let codeVisible = false;
    let playing = false;
    let playbackTimer;

    const refreshIcons = () =&gt; {
      if (globalThis.lucide?.createIcons) {
        globalThis.lucide.createIcons({ attrs: { width: 16, height: 16 } });
      }
    };

    const stopPlayback = () =&gt; {
      playing = false;
      globalThis.clearTimeout(playbackTimer);
      play.textContent = &quot;Play story&quot;;
      play.setAttribute(&quot;aria-pressed&quot;, &quot;false&quot;);
    };

    const scheduleNext = () =&gt; {
      globalThis.clearTimeout(playbackTimer);
      if (!playing) return;
      playbackTimer = globalThis.setTimeout(() =&gt; {
        if (sceneIndex &gt;= scenes.length - 1) {
          stopPlayback();
          return;
        }
        sceneIndex += 1;
        renderScene(&quot;forward&quot;);
        scheduleNext();
      }, 8500);
    };

    const renderScene = (direction = &quot;forward&quot;) =&gt; {
      const scene = scenes[sceneIndex];
      count.textContent = `Scene ${sceneIndex + 1} of ${scenes.length}`;
      progress.setAttribute(&quot;aria-valuenow&quot;, String(sceneIndex + 1));
      progressFill.style.width = `${((sceneIndex + 1) / scenes.length) * 100}%`;
      chapter.textContent = scene.chapter;
      title.textContent = scene.title;
      caption.textContent = scene.caption;
      orderAnchorNode.hidden = !scene.anchor;
      if (scene.anchor) {
        orderAnchorLabel.textContent = scene.anchor.label;
        orderAnchorStatus.textContent = scene.anchor.status;
      }
      stage.setAttribute(&quot;aria-label&quot;, scene.aria);
      stage.innerHTML = scene.stage();
      const sceneNode = stage.querySelector(&quot;.story-scene&quot;);
      const visualDirection = scene.rewind ? &quot;backward&quot; : direction;
      sceneNode?.classList.add(visualDirection === &quot;backward&quot; ? &quot;is-backward&quot; : &quot;is-forward&quot;);
      codeList.innerHTML = scene.code.map((item) =&gt; `&lt;li&gt;${item}&lt;/li&gt;`).join(&quot;&quot;);
      back.disabled = sceneIndex === 0;
      next.textContent = sceneIndex === scenes.length - 1 ? &quot;Replay&quot; : &quot;Next&quot;;
      refreshIcons();
    };

    back.addEventListener(&quot;click&quot;, () =&gt; {
      stopPlayback();
      if (sceneIndex &gt; 0) sceneIndex -= 1;
      renderScene(&quot;backward&quot;);
    });

    next.addEventListener(&quot;click&quot;, () =&gt; {
      stopPlayback();
      sceneIndex = sceneIndex === scenes.length - 1 ? 0 : sceneIndex + 1;
      renderScene(&quot;forward&quot;);
    });

    play.addEventListener(&quot;click&quot;, () =&gt; {
      if (playing) {
        stopPlayback();
        return;
      }
      if (sceneIndex === scenes.length - 1) {
        sceneIndex = 0;
        renderScene(&quot;forward&quot;);
      }
      playing = true;
      play.textContent = &quot;Pause story&quot;;
      play.setAttribute(&quot;aria-pressed&quot;, &quot;true&quot;);
      scheduleNext();
    });

    codeToggle.addEventListener(&quot;click&quot;, () =&gt; {
      codeVisible = !codeVisible;
      if (codeVisible) stopPlayback();
      play.disabled = codeVisible;
      stage.hidden = codeVisible;
      codePanel.hidden = !codeVisible;
      codeToggle.setAttribute(&quot;aria-pressed&quot;, String(codeVisible));
      codeToggle.textContent = codeVisible ? &quot;Show story&quot; : &quot;Show code&quot;;
    });

    renderScene();
  })();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;

(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });

  if (globalThis.lucide != null) {
    initialize();

  }

    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
