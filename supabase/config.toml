# Local PostgreSQL only. Flyway in the Java service is the sole schema owner.
project_id = "order-system"

[api]
enabled = false
port = 54331
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54332
shadow_port = 54330
major_version = 17

[db.pooler]
enabled = false
port = 54339
pool_mode = "session"
default_pool_size = 10
max_client_conn = 50

[db.migrations]
# Supabase migrations stay disabled so schema ownership cannot drift from Flyway.
enabled = false
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[realtime]
enabled = false

[studio]
enabled = false
port = 54333

[inbucket]
enabled = false
port = 54334

[storage]
enabled = false
file_size_limit = "50MiB"

[auth]
enabled = false
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_signup = false
enable_anonymous_sign_ins = false

[analytics]
enabled = false
port = 54337
backend = "postgres"

[edge_runtime]
enabled = false
policy = "oneshot"
inspector_port = 8083
