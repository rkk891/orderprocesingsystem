spring:
  application:
    name: order-processing-system
  jackson:
    deserialization:
      accept-float-as-int: false
      fail-on-unknown-properties: true
    mapper:
      allow-coercion-of-scalars: false
    read:
      strict-duplicate-detection: true
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

orders:
  scheduler:
    enabled: ${ORDERS_SCHEDULER_ENABLED:true}

springdoc:
  enable-default-api-docs: false
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
    disable-swagger-default-url: true
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
